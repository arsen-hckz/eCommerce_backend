name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main


jobs:
  deploy:
    runs-on: ubuntu-latest
    steps: 
     - name: Deploy to server
       uses: appleboy/ssh-action@master
       with:
         host: 68.183.69.101
         username: root
         key: ${{secrets.SSH_PRIVATE_KEY}}
         script: /var/www/eCommerce_backend/deploy.sh